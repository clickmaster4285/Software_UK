name: Merge to Master & Deploy

on:
  push:
    branches-ignore:
      - master

permissions:
  contents: write

jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch master
        run: git fetch origin master

      - name: Attempt merge to master
        id: merge
        run: |
          git checkout master
          git pull origin master
          echo "BASE_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          if git merge --no-ff "origin/${{ github.ref_name }}" --no-edit; then
            echo "merge_status=success" >> $GITHUB_OUTPUT
          else
            echo "merge_status=failed" >> $GITHUB_OUTPUT
            echo "::error::Merge conflict detected on branch '${{ github.ref_name }}'. Fix conflicts locally and push again."
            git merge --abort
            exit 1
          fi

      - name: Push merged master
        if: steps.merge.outputs.merge_status == 'success'
        id: push
        run: |
          git push origin master
          echo "MERGE_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: SSH — Pull & Build on Server
        if: steps.merge.outputs.merge_status == 'success'
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          envs: BASE_COMMIT=${{ steps.merge.outputs.BASE_COMMIT }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="/var/www/Clickmastersoftware"
            PM2_PROCESS="clickmastersoftwareuk"
            PREV_COMMIT=$(cd "$DEPLOY_DIR" && git rev-parse HEAD)

            echo "═══════════════════════════════════════"
            echo "🚀 Starting deployment"
            echo "Previous server commit: ${PREV_COMMIT:0:8}"
            echo "═══════════════════════════════════════"

            cd "$DEPLOY_DIR"

            git fetch origin master
            git checkout master
            git pull origin master

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New commit: ${NEW_COMMIT:0:8}"

            if [[ "$PREV_COMMIT" == "$NEW_COMMIT" ]]; then
              echo "⚠ No new changes. Skipping build."
              exit 0
            fi

            echo "📦 Installing dependencies..."
            npm ci

            echo "🔨 Building..."
            if npm run build; then
              echo "✅ Build successful"
              pm2 restart "$PM2_PROCESS"
              sleep 3
              if pm2 pid "$PM2_PROCESS" > /dev/null 2>&1; then
                echo "✅ PM2 restarted successfully"
              else
                echo "❌ PM2 process not running after restart"
                exit 1
              fi
            else
              echo "❌ Build failed — rolling back server to previous commit"
              git reset --hard "$PREV_COMMIT"
              npm ci --silent
              npm run build
              pm2 restart "$PM2_PROCESS"
              echo "� Server rolled back to ${PREV_COMMIT:0:8}"
              exit 1
            fi

      - name: Rollback — Revert merge on GitHub
        if: failure() && steps.merge.outputs.merge_status == 'success' && steps.push.outcome == 'success'
        run: |
          echo "� Reverting merge commit on GitHub..."
          git revert -m 1 ${{ steps.push.outputs.MERGE_COMMIT }} --no-edit
          git push origin master
          echo "::warning::Merge was reverted on master due to build failure."
