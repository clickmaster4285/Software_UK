name: Merge to Master & Deploy

on:
  push:
    branches-ignore:
      - master

permissions:
  contents: write
  workflows: write

jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch master
        run: git fetch origin master

      - name: Attempt merge to master
        id: merge
        run: |
          git checkout master
          git pull origin master
          echo "BASE_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          if git merge --no-ff "origin/${{ github.ref_name }}" --no-edit; then
            echo "merge_status=success" >> $GITHUB_OUTPUT
          else
            echo "merge_status=failed" >> $GITHUB_OUTPUT
            echo "::error::Merge conflict on branch '${{ github.ref_name }}'. Fix locally and re-push."
            git merge --abort
            exit 1
          fi

      - name: Push merged master
        if: steps.merge.outputs.merge_status == 'success'
        id: push
        run: |
          git push origin master
          echo "MERGE_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: SSH — Pull, Build & Deploy
        if: steps.merge.outputs.merge_status == 'success'
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 300s
          script: |
            set -uo pipefail

            DEPLOY_DIR="/var/www/Clickmastersoftware"
            PM2_PROCESS="clickmastersoftwareuk"

            cd "$DEPLOY_DIR"
            PREV_COMMIT=$(git rev-parse HEAD)

            echo "═══════════════════════════════════════"
            echo "� Deploy starting"
            echo "Current: ${PREV_COMMIT:0:8}"
            echo "═══════════════════════════════════════"

            git fetch origin master
            git checkout master
            git pull origin master

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "Pulled:  ${NEW_COMMIT:0:8}"

            if [[ "$PREV_COMMIT" == "$NEW_COMMIT" ]]; then
              echo "No changes. Skipping."
              exit 0
            fi

            echo "📦 npm ci..."
            npm ci

            echo "🔨 Building..."
            if npm run build; then
              echo "✅ Build OK"
              pm2 restart "$PM2_PROCESS"
              sleep 3
              if pm2 pid "$PM2_PROCESS" > /dev/null 2>&1; then
                echo "✅ PM2 online"
              else
                echo "❌ PM2 not running"
                exit 1
              fi
            else
              echo "❌ Build failed — rolling back"
              git reset --hard "$PREV_COMMIT"
              npm ci --silent
              npm run build
              pm2 restart "$PM2_PROCESS"
              echo "Server restored to ${PREV_COMMIT:0:8}"
              exit 1
            fi

      - name: Notify — Deploy Success
        if: steps.merge.outputs.merge_status == 'success' && success() && steps.deploy.outcome == 'success'
        run: |
          echo "::notice::✅ Deploy succeeded! Branch '${{ github.ref_name }}' merged, built, and restarted on server."

      - name: Rollback — Revert merge on GitHub
        if: failure() && steps.merge.outputs.merge_status == 'success' && steps.push.outcome == 'success' && steps.push.outputs.MERGE_COMMIT
        run: |
          echo "Reverting merge commit: ${{ steps.push.outputs.MERGE_COMMIT }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git revert -m 1 "${{ steps.push.outputs.MERGE_COMMIT }}" --no-edit
          git push origin master
          echo "::warning::Merge reverted due to deploy failure."
